<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Spend AI - Sign Up</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <h1 class="logo">💰 Smart Spend <span>AI</span></h1>
      <p class="tagline">Create your account</p>

      <form id="signupForm">
        <div class="input-group">
          <label for="newUsername">Username</label>
          <input type="text" id="newUsername" placeholder="Choose a username" required>
        </div>

        <div class="input-group">
          <label for="newPassword">Password</label>
          <input type="password" id="newPassword" placeholder="Choose a password" required>
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
        </div>

        <p id="signupError" class="error-msg"></p>

        <button type="submit" class="login-btn">Sign Up</button>
      </form>

      <p class="signup-link">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script src="signup.js"></script>
</body>
</html>
